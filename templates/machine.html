<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ machine.name }} - Gym Guide</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">
    <div class="video-container">
        <video autoplay loop muted playsinline controls>
            <source src="{{ url_for('static', filename='videos/' + machine.video_url) }}" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <div class="details">
        <h1>{{ machine.name }}</h1>
        <div class="muscle-badge">{{ machine.muscle }}</div>
        
        <div class="description-title">How to use / Instructions:</div>
        <p>{{ machine.desc }}</p>
    </div>
</div>

</body>
</html>
